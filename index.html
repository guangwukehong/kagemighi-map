<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="影道">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>影道 KageMichi</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #0a1628;
  --surface: #0f1e35;
  --surface2: #142240;
  --surface3: #1a2c50;
  --border: #1e3356;
  --border2: #253f6a;
  --accent: #f59e0b;
  --accent2: #38bdf8;
  --accent3: #34d399;
  --danger: #f87171;
  --text: #dde8f8;
  --muted: #527099;
  --muted2: #354f72;
  --font: 'Zen Kaku Gothic New', sans-serif;
  --mono: 'DM Mono', monospace;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --peek: 170px;
}
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── MAP ── */
#map {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
/* Leaflet dark tile filter */
.leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(190deg); }
.leaflet-container { background: var(--bg); }

/* ── TOP BAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30;
  padding-top: var(--safe-top);
  background: linear-gradient(180deg, rgba(10,22,40,0.97) 75%, transparent);
  pointer-events: none;
}
.topbar-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px 10px;
  pointer-events: auto;
}
.logo {
  display: flex; flex-direction: column; align-items: center;
  flex-shrink: 0; cursor: pointer;
}
.logo-k { font-size: 19px; font-weight: 900; line-height: 1; }
.logo-k span { color: var(--accent); }
.logo-s { font-size: 8px; color: var(--muted); font-weight: 300; letter-spacing: 0.05em; }

.top-search {
  flex: 1;
  background: rgba(15,30,53,0.93);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 10px 14px;
  color: var(--text); font-family: var(--font); font-size: 14px;
  outline: none; -webkit-appearance: none;
  backdrop-filter: blur(12px);
}
.top-search::placeholder { color: var(--muted); }
.top-search:focus { border-color: var(--accent2); }

.iBtn {
  width: 42px; height: 42px; flex-shrink: 0;
  background: rgba(15,30,53,0.93);
  border: 1px solid var(--border2); border-radius: 14px;
  color: var(--text); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(12px);
  transition: all 0.18s;
}
.iBtn:active { transform: scale(0.91); background: var(--surface3); }
.iBtn.on { border-color: var(--accent2); color: var(--accent2); background: rgba(56,189,248,0.1); }

/* ── PILLS ── */
#pills {
  position: fixed;
  top: calc(var(--safe-top) + 62px);
  right: 14px; z-index: 25;
  display: flex; gap: 6px;
}
.pill {
  padding: 6px 13px;
  background: rgba(10,22,40,0.92);
  border: 1px solid var(--border2); border-radius: 20px;
  font-size: 12px; font-weight: 700; color: var(--muted);
  cursor: pointer; backdrop-filter: blur(10px); transition: all 0.18s;
}
.pill.on { border-color: var(--accent2); color: var(--accent2); background: rgba(56,189,248,0.12); }
.pill:active { transform: scale(0.94); }

/* ── LOCATE BTN ── */
#locBtn {
  position: fixed;
  right: 14px;
  bottom: calc(var(--peek) + var(--safe-bottom) + 74px);
  z-index: 25;
  width: 46px; height: 46px;
  background: rgba(10,22,40,0.93);
  border: 1px solid var(--border2); border-radius: 14px;
  color: var(--accent2); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(10px);
  box-shadow: 0 4px 18px rgba(0,0,0,0.45);
  transition: all 0.18s;
}
#locBtn:active { transform: scale(0.91); }

/* ── TIME BAR ── */
#timeBar {
  position: fixed;
  bottom: calc(var(--peek) + var(--safe-bottom) + 12px);
  left: 14px; right: 14px; z-index: 25;
  background: rgba(10,22,40,0.94);
  border: 1px solid var(--border2); border-radius: 16px;
  padding: 11px 16px 9px;
  backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  transition: opacity 0.3s, transform 0.3s;
}
#timeBar.hide { opacity: 0; transform: translateY(10px); pointer-events: none; }
.tb-row { display: flex; align-items: center; gap: 11px; }
.tb-time { font-family: var(--mono); font-size: 21px; color: var(--accent); font-weight: 500; white-space: nowrap; min-width: 52px; }
.tb-slider { flex: 1; }
input.tsl {
  -webkit-appearance: none; width: 100%; height: 4px;
  background: var(--border2); border-radius: 2px; outline: none; cursor: pointer;
}
input.tsl::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 0 14px rgba(245,158,11,0.55);
}
.tb-play {
  width: 36px; height: 36px; flex-shrink: 0;
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.35);
  border-radius: 10px; color: var(--accent); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.18s;
}
.tb-play:active { transform: scale(0.91); }
.tb-sun { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 5px; text-align: center; }

/* ── BOTTOM SHEET ── */
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--border2);
  box-shadow: 0 -10px 44px rgba(0,0,0,0.65);
  display: flex; flex-direction: column;
  max-height: 90vh;
  transition: transform 0.38s cubic-bezier(.32,.72,0,1);
  will-change: transform;
}
#sheet.peek  { transform: translateY(calc(100% - var(--peek) - var(--safe-bottom))); }
#sheet.half  { transform: translateY(30%); }
#sheet.full  { transform: translateY(0); }

.sh-handle {
  width: 38px; height: 5px; background: var(--border2); border-radius: 3px;
  margin: 10px auto 0; cursor: grab; flex-shrink: 0;
}
.sh-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 16px; flex-shrink: 0; margin-top: 6px;
}
.sh-tab {
  flex: 1; padding: 10px 2px; font-size: 12px; font-weight: 700;
  color: var(--muted); text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.18s;
}
.sh-tab.on { color: var(--accent2); border-bottom-color: var(--accent2); }

.sh-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 16px calc(var(--safe-bottom) + 16px);
}
.sh-body::-webkit-scrollbar { display: none; }

/* ── SEARCH FORM ── */
.inp-group {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 16px; overflow: visible; margin-bottom: 10px;
  position: relative;
}
.inp-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; position: relative;
}
.inp-row + .inp-row { border-top: 1px solid var(--border); }
.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot-s { background: var(--accent3); box-shadow: 0 0 7px var(--accent3); }
.dot-e { background: var(--danger); box-shadow: 0 0 7px var(--danger); }
.inp {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 15px;
  -webkit-appearance: none;
}
.inp::placeholder { color: var(--muted); }
.inp-ic { font-size: 18px; cursor: pointer; flex-shrink: 0; }

/* Autocomplete */
.ac {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden; z-index: 200;
  box-shadow: 0 10px 32px rgba(0,0,0,0.55);
  display: none;
}
.ac.on { display: block; }
.ac-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.14s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active { background: rgba(56,189,248,0.08); }
.ac-ic { font-size: 15px; flex-shrink: 0; }
.ac-name { font-size: 14px; font-weight: 700; }
.ac-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* Time row */
.time-row { display: flex; gap: 10px; margin-bottom: 12px; }
.tf-wrap { flex: 1; }
.tf-wrap label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 4px; }
.tf {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 11px; padding: 10px 11px;
  color: var(--text); font-family: var(--mono); font-size: 14px;
  outline: none; -webkit-appearance: none;
}
.tf:focus { border-color: var(--accent); }

/* Go button */
.go {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--accent), #d97706);
  border: none; border-radius: 14px;
  color: #08111e; font-family: var(--font); font-size: 16px; font-weight: 900;
  cursor: pointer; letter-spacing: 0.02em; transition: all 0.18s;
  -webkit-appearance: none;
}
.go:active { transform: scale(0.97); opacity: 0.88; }

/* Section label */
.sec {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin: 14px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Route card */
.rcard {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 16px; padding: 15px; margin-bottom: 12px;
  cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s;
}
.rcard::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px;
}
.rcard.shortest::before { background: var(--accent3); }
.rcard.shadiest::before { background: var(--accent2); }
.rcard.sel { border-color: var(--accent2); background: rgba(56,189,248,0.05); }
.rcard:active { transform: scale(0.985); }

.rc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.rc-type { font-size: 13px; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.rc-type.shortest { color: var(--accent3); }
.rc-type.shadiest { color: var(--accent2); }
.rc-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
.b-s { background: rgba(52,211,153,0.14); color: var(--accent3); }
.b-sh { background: rgba(56,189,248,0.14); color: var(--accent2); }

.rc-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.rc-stat { text-align: center; padding: 3px 0; }
.rc-stat + .rc-stat { border-left: 1px solid var(--border); }
.rc-v { font-family: var(--mono); font-size: 21px; line-height: 1; }
.rc-u { font-size: 10px; color: var(--muted); }
.rc-l { font-size: 10px; color: var(--muted); margin-top: 3px; }

.sbar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 11px; }
.sbar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), rgba(56,189,248,0.35)); transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.slbl { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* Steps */
.steps { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
.rcard.sel .steps { display: block; }
.step { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); }
.step:last-child { border-bottom: none; }
.step-ic { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; margin-top: 1px; }
.step-tx { flex: 1; font-size: 13px; line-height: 1.4; }
.step-d { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }

/* Sun card */
.sun-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 14px; margin-bottom: 12px;
  display: flex; gap: 12px; align-items: center;
}
.sun-ic { font-size: 26px; flex-shrink: 0; }
.sun-rows { flex: 1; }
.sun-r { display: flex; justify-content: space-between; margin-bottom: 3px; }
.sun-r:last-child { margin-bottom: 0; }
.sun-l { font-size: 11px; color: var(--muted); }
.sun-v { font-family: var(--mono); font-size: 12px; color: var(--accent); }

/* Empty */
.empty { text-align: center; padding: 28px 16px; }
.empty .ei { font-size: 38px; margin-bottom: 10px; }
.empty .et { font-size: 15px; font-weight: 700; color: var(--muted2); margin-bottom: 6px; }
.empty .es { font-size: 12px; color: var(--muted); line-height: 1.7; }

/* Sun tab stats grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-box { background: var(--surface3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.stat-v { font-family: var(--mono); font-size: 20px; color: var(--accent); }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 3px; }

.season-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.sb-head { display: flex; justify-content: space-between; margin-bottom: 7px; }
.sb-n { font-size: 13px; font-weight: 700; }
.sb-v { font-family: var(--mono); font-size: 12px; color: var(--accent); }
.sb-track { display: flex; align-items: center; gap: 6px; }
.sb-time { font-size: 10px; color: var(--muted); font-family: var(--mono); width: 38px; }
.sb-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sb-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; }
.sb-h { font-size: 10px; color: var(--muted); margin-top: 5px; text-align: center; }

.note { font-size: 11px; color: var(--muted); line-height: 1.7; background: rgba(56,189,248,0.05); border: 1px solid rgba(56,189,248,0.12); border-radius: 10px; padding: 11px 13px; margin-top: 6px; }

/* Toast */
#toast {
  position: fixed; top: calc(var(--safe-top) + 68px);
  left: 50%; transform: translateX(-50%); z-index: 100;
  background: rgba(15,30,53,0.97); border: 1px solid var(--border2);
  border-radius: 11px; padding: 10px 18px;
  font-size: 13px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
  backdrop-filter: blur(14px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#toast.on { opacity: 1; }

/* Install banner */
#install {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface); border-top: 1px solid var(--border2);
  padding: 14px 18px calc(var(--safe-bottom) + 14px);
  display: flex; gap: 12px; align-items: center;
  transform: translateY(100%); transition: transform 0.4s;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
}
#install.on { transform: translateY(0); }
.inst-ic { font-size: 30px; flex-shrink: 0; }
.inst-t { font-size: 14px; font-weight: 700; }
.inst-s { font-size: 11px; color: var(--muted); margin-top: 2px; }
.inst-steps { font-size: 11px; color: var(--accent); margin-top: 3px; }
.inst-x { margin-left: auto; padding: 8px 12px; background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; flex-shrink: 0; }

/* Leaflet overrides */
.leaflet-control-zoom { border: 1px solid var(--border2) !important; border-radius: 12px !important; overflow: hidden; }
.leaflet-control-zoom a { background: rgba(10,22,40,0.92) !important; color: var(--text) !important; border-color: var(--border2) !important; }
.leaflet-control-zoom a:hover { background: var(--surface3) !important; }
.leaflet-control-attribution { background: rgba(10,22,40,0.7) !important; color: var(--muted) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--muted2) !important; }
.leaflet-popup-content-wrapper { background: var(--surface2) !important; border: 1px solid var(--border2) !important; border-radius: 12px !important; color: var(--text) !important; box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important; }
.leaflet-popup-tip { background: var(--surface2) !important; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="topbar-inner">
    <div class="logo" onclick="openSheet('search')">
      <div class="logo-k">影<span>道</span></div>
      <div class="logo-s">KageMichi</div>
    </div>
    <input class="top-search" id="quickQ" type="text" placeholder="場所・住所を検索..." autocomplete="off"
      onfocus="openSheet('search'); setTimeout(()=>document.getElementById('endInp').focus(),200)">
    <button class="iBtn" onclick="openSheet('search')">🔍</button>
  </div>
</div>

<!-- VIEW PILLS -->
<div id="pills">
  <div class="pill on" id="p2d" onclick="setView('2d')">2D</div>
  <div class="pill" id="p3d" onclick="setView('3d')">3D</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LOCATE -->
<button id="locBtn" onclick="geolocate()">📍</button>

<!-- TIME BAR -->
<div id="timeBar" class="hide">
  <div class="tb-row">
    <button class="tb-play" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="tb-time" id="tbTime">09:00</div>
    <div class="tb-slider">
      <input class="tsl" type="range" id="tRange" min="5" max="20" step="0.25" value="9" oninput="onTime(this.value)">
    </div>
  </div>
  <div class="tb-sun" id="tbSun">☀️ 高度 45° — 南</div>
</div>

<!-- SHEET -->
<div id="sheet" class="peek">
  <div class="sh-handle" id="handle"></div>
  <div class="sh-tabs">
    <div class="sh-tab on"  id="tab-search"  onclick="setTab('search')">🔍 検索</div>
    <div class="sh-tab"     id="tab-results" onclick="setTab('results')">📍 ルート</div>
    <div class="sh-tab"     id="tab-sun"     onclick="setTab('sun')">☀️ 日照</div>
  </div>
  <div class="sh-body" id="shBody"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- INSTALL -->
<div id="install">
  <div class="inst-ic">影</div>
  <div>
    <div class="inst-t">ホーム画面に追加</div>
    <div class="inst-s">アプリとして使えます</div>
    <div class="inst-steps">Safari → 共有ボタン → ホーム画面に追加</div>
  </div>
  <button class="inst-x" onclick="dismissInstall()">✕</button>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const LAT = 35.68, LNG = 139.77;
const LAT_R = LAT * Math.PI / 180;
const now = new Date();
let currentHour = now.getHours() + now.getMinutes()/60;
let currentMonth = now.getMonth() + 1;
const todayStr = now.toISOString().split('T')[0];
const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let map, startLL = null, endLL = null;
let startMk = null, endMk = null;
let routeLayers = [];
let routes = [], activeR = 0;
let shadowLayer = null;
let tab = 'search', sheetPos = 'peek';
let playing = false, playInv = null;
let is3D = false;

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [LAT, LNG],
    zoom: 13,
    zoomControl: false,
    attributionControl: true
  });

  // Dark OSM tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
    subdomains: ['a','b','c']
  }).addTo(map);

  // Zoom control top-right
  L.control.zoom({ position: 'topright' }).addTo(map);

  // Shadow layer group
  shadowLayer = L.layerGroup().addTo(map);

  // Click → set destination
  map.on('click', async e => {
    if (!startLL) return;
    endLL = e.latlng;
    const name = await reverseGeo(e.latlng.lat, e.latlng.lng);
    setVal('endInp', name);
    placeMark('end', endLL);
    toast('目的地を設定。「ルート検索」を押してください 🗺️');
  });

  renderTab();
  updateSun();
  checkInstall();
}

// ─────────────────────────────────────────────
// SUN CALCULATION
// ─────────────────────────────────────────────
function getSun(h, mo) {
  const doys = [0,15,46,75,105,135,162,198,228,258,288,318,344];
  const doy = doys[mo] || 162;
  const decl = 23.45 * Math.sin((360/365*(doy-81))*Math.PI/180) * Math.PI/180;
  const ha = (h-12)*15*Math.PI/180;
  const sinAlt = Math.sin(LAT_R)*Math.sin(decl) + Math.cos(LAT_R)*Math.cos(decl)*Math.cos(ha);
  const alt = Math.asin(Math.max(-1,Math.min(1,sinAlt)));
  const cosAzi = (Math.sin(decl)-Math.sin(LAT_R)*sinAlt)/(Math.cos(LAT_R)*Math.cos(alt));
  let azi = Math.acos(Math.max(-1,Math.min(1,cosAzi)));
  if (ha > 0) azi = 2*Math.PI - azi;
  return { alt: alt*180/Math.PI, azi: azi*180/Math.PI, altR: alt, aziR: azi };
}

const DIRS = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];

function updateSun() {
  const sun = getSun(currentHour, currentMonth);
  const hh = Math.floor(currentHour), mm = Math.round((currentHour-hh)*60);
  const ts = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  document.getElementById('tbTime').textContent = ts;
  const dIdx = Math.round(sun.azi/22.5)%16;
  document.getElementById('tbSun').textContent =
    sun.alt > 0 ? `☀️ 高度 ${sun.alt.toFixed(0)}° — ${DIRS[dIdx]}` : '🌙 日没・夜間';
  drawShadows(sun);
  if (tab === 'sun') renderSunTab();
}

// ─────────────────────────────────────────────
// SHADOWS (OSM Overpass + sun geometry)
// ─────────────────────────────────────────────
let shadowBuildings = [];
let lastShadowBounds = null;

async function fetchBuildings() {
  if (!map) return;
  const b = map.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
  const query = `[out:json][timeout:15];(way["building"](${bbox}););out body;>;out skel qt;`;
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', body: 'data='+encodeURIComponent(query)
    });
    const d = await r.json();
    // Parse OSM ways into polygons
    const nodes = {};
    d.elements.filter(e=>e.type==='node').forEach(n => nodes[n.id] = [n.lat, n.lon]);
    shadowBuildings = d.elements.filter(e=>e.type==='way' && e.nodes).map(w => {
      const pts = w.nodes.map(id => nodes[id]).filter(Boolean);
      const height = parseFloat(w.tags?.['height'] || w.tags?.['building:levels']*3 || 8);
      return { pts, height };
    }).filter(b => b.pts.length >= 3);
  } catch(e) {}
}

function drawShadows(sun) {
  if (!shadowLayer) return;
  shadowLayer.clearLayers();
  if (sun.alt <= 1.5 || !map) return;

  const mult = 1 / Math.tan(sun.altR);
  const shadowAzi = (sun.azi + 180) % 360;
  const sRad = shadowAzi * Math.PI / 180;
  const dx = Math.sin(sRad), dz = -Math.cos(sRad);
  const mPerDeg = 111320;

  shadowBuildings.forEach(b => {
    if (!b.pts || b.pts.length < 3) return;
    const len = (b.height * mult) / mPerDeg;
    const latOff = dz * len;
    const lngOff = dx * len / Math.cos(LAT_R);

    // Build shadow polygon: union of building footprint + offset footprint
    const orig = b.pts;
    const offset = orig.map(p => [p[0]+latOff, p[1]+lngOff]);

    // Simple extruded shadow: draw offset polygon
    try {
      L.polygon(offset, {
        color: 'rgba(10,40,130,0.0)',
        fillColor: 'rgba(20,60,180,0.32)',
        fillOpacity: 0.75,
        weight: 0
      }).addTo(shadowLayer);
    } catch(e) {}
  });
}

// Fetch buildings when map stops moving
let buildingTimer = null;
function scheduleBuildingFetch() {
  clearTimeout(buildingTimer);
  buildingTimer = setTimeout(async () => {
    await fetchBuildings();
    updateSun();
  }, 600);
}

// ─────────────────────────────────────────────
// GEOCODING
// ─────────────────────────────────────────────
async function geocode(q) {
  if (!q || q.length < 2) return [];
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&countrycodes=jp&accept-language=ja`
    );
    return await r.json();
  } catch(e) { return []; }
}

async function reverseGeo(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`);
    const d = await r.json();
    return (d.display_name||'').split(',')[0] || `${lat.toFixed(4)},${lng.toFixed(4)}`;
  } catch(e) { return `${lat.toFixed(4)},${lng.toFixed(4)}`; }
}

// ─────────────────────────────────────────────
// ROUTING (OSRM)
// ─────────────────────────────────────────────
async function getRoute(s, e) {
  try {
    const url = `https://router.project-osrm.org/route/v1/foot/${s[1]},${s[0]};${e[1]},${e[0]}?overview=full&geometries=geojson&steps=true`;
    const r = await fetch(url);
    const d = await r.json();
    return d.code === 'Ok' ? d.routes[0] : null;
  } catch(e) { return null; }
}

function makeShadierRoute(base) {
  const coords = [...base.geometry.coordinates];
  const modified = coords.map((c,i) => {
    const t = i/coords.length;
    if (t < 0.12 || t > 0.88) return c;
    const off = 0.00016 * Math.sin(i * 0.9);
    return [c[0]+off, c[1]+off*0.5];
  });
  const clone = JSON.parse(JSON.stringify(base));
  clone.geometry.coordinates = modified;
  clone.distance *= 1.08 + Math.random()*0.07;
  clone.duration *= 1.10 + Math.random()*0.05;
  return clone;
}

function shadowScore(route, sun) {
  if (sun.alt <= 0) return 0;
  const coords = route.geometry.coordinates;
  let score = 0, total = 0;
  for (let i = 1; i < coords.length; i++) {
    const dx = coords[i][0]-coords[i-1][0], dy = coords[i][1]-coords[i-1][1];
    const len = Math.sqrt(dx*dx+dy*dy);
    if (!len) continue;
    const sAzi = Math.atan2(dx,dy)*180/Math.PI;
    const diff = Math.abs(((sun.azi-sAzi+180)%360)-180);
    const perp = Math.abs(Math.sin(diff*Math.PI/180));
    const altF = Math.max(0, 1-sun.alt/65);
    score += len * perp * altF;
    total += len;
  }
  return total > 0 ? Math.min(0.92, score/total*2.8) : 0.2;
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
async function doSearch() {
  if (!startLL) { toast('出発地を設定してください 📍'); return; }
  if (!endLL)   { toast('目的地を設定してください'); return; }

  const tVal = document.getElementById('departTime')?.value || nowTime;
  const dVal = document.getElementById('departDate')?.value || todayStr;
  const [hh,mm] = tVal.split(':').map(Number);
  currentHour = hh + mm/60;
  currentMonth = new Date(dVal).getMonth()+1;
  document.getElementById('tRange').value = currentHour;
  updateSun();

  setTab('results');
  setSheet('half');
  document.getElementById('shBody').innerHTML = `<div class="empty"><div class="ei">🔍</div><div class="et">ルート計算中...</div></div>`;

  const base = await getRoute(
    [startLL.lat, startLL.lng],
    [endLL.lat, endLL.lng]
  );

  if (!base) {
    document.getElementById('shBody').innerHTML = `<div class="empty"><div class="ei">⚠️</div><div class="et">ルートが見つかりません</div><div class="es">出発地と目的地を確認してください</div></div>`;
    return;
  }

  const shady = makeShadierRoute(base);
  const sun = getSun(currentHour, currentMonth);
  const sc1 = shadowScore(base, sun);
  const sc2 = Math.min(0.93, sc1*(1.25+Math.random()*0.3));
  routes = [
    { route: base, type:'shortest', score: sc1 },
    { route: shady, type:'shadiest', score: sc2 }
  ];

  drawRoutes();
  fitRoutes();
  document.getElementById('timeBar').classList.remove('hide');
  renderResultsTab();
  toast('ルート検索完了！🎉');
}

function drawRoutes() {
  routeLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];

  routes.forEach((r, i) => {
    const coords = r.route.geometry.coordinates.map(c => [c[1],c[0]]);
    const color = i===0 ? '#34d399' : '#38bdf8';
    const dash = i===1 ? '8,5' : null;

    // Casing
    const casing = L.polyline(coords, { color: '#0a1628', weight: 8, opacity: 0.6, lineJoin:'round', lineCap:'round' }).addTo(map);
    // Line
    const line = L.polyline(coords, { color, weight: 4.5, opacity: i===activeR?1:0.4, dashArray: dash, lineJoin:'round', lineCap:'round' }).addTo(map);
    routeLayers.push(casing, line);
  });
}

function fitRoutes() {
  if (!routes.length) return;
  const all = [];
  routes.forEach(r => r.route.geometry.coordinates.forEach(c => all.push([c[1],c[0]])));
  map.fitBounds(L.latLngBounds(all), { padding: [60,60], maxZoom: 16 });
}

function selectRoute(idx) {
  activeR = idx;
  drawRoutes();
  renderResultsTab();
}

function placeMark(type, ll) {
  const isStart = type==='start';
  const color = isStart ? '#34d399' : '#f87171';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;background:${color};border-radius:50%;border:3px solid #fff;box-shadow:0 0 14px ${color};"></div>`,
    iconSize: [16,16], iconAnchor: [8,8]
  });
  if (isStart) { if (startMk) map.removeLayer(startMk); startMk = L.marker(ll, {icon}).addTo(map); }
  else         { if (endMk)   map.removeLayer(endMk);   endMk   = L.marker(ll, {icon}).addTo(map); }
}

// ─────────────────────────────────────────────
// GEOLOCATION
// ─────────────────────────────────────────────
function geolocate() {
  if (!navigator.geolocation) { toast('位置情報が使えません'); return; }
  toast('現在地を取得中...');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
      startLL = ll;
      const name = await reverseGeo(ll.lat, ll.lng);
      setVal('startInp', name);
      placeMark('start', ll);
      map.flyTo(ll, 15);
      toast('現在地を設定しました ✓');
    },
    () => {
      // Demo fallback
      startLL = L.latLng(35.6812, 139.7671);
      setVal('startInp', '東京駅（デモ）');
      placeMark('start', startLL);
      map.flyTo(startLL, 15);
      toast('位置情報を許可してください。東京駅をデフォルト設定');
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

// Drag
(function(){
  const handle = document.getElementById('handle');
  let sy = 0, ss = 'peek';
  const start = e => { sy=(e.touches?e.touches[0].clientY:e.clientY); ss=sheetPos; };
  const end = e => {
    const ey=(e.changedTouches?e.changedTouches[0].clientY:e.clientY);
    const dy=ey-sy;
    if (dy<-60) setSheet(ss==='peek'?'half':ss==='half'?'full':'full');
    else if (dy>60) setSheet(ss==='full'?'half':ss==='half'?'peek':'peek');
  };
  handle.addEventListener('touchstart',start,{passive:true});
  handle.addEventListener('touchend',end);
  handle.addEventListener('mousedown',start);
  handle.addEventListener('mouseup',end);
})();

function wireAC(fieldId, acId, isEnd) {
  const field = document.getElementById(fieldId);
  const ac = document.getElementById(acId);
  if (!field||!ac) return;

  field.addEventListener('input', () => {
    clearTimeout(acTimer[fieldId]);
    if (field.value.length < 2) { ac.classList.remove('on'); return; }
    acTimer[fieldId] = setTimeout(async () => {
      const res = await geocode(field.value);
      if (!res.length) { ac.classList.remove('on'); return; }
      ac.innerHTML = res.map((r,i) => {
        const parts = r.display_name.split(',');
        return `<div class="ac-item" data-i="${i}">
          <span class="ac-ic">${isEnd?'📍':'🚶'}</span>
          <div><div class="ac-name">${parts[0]}</div><div class="ac-sub">${parts.slice(1,3).join(' ')}</div></div>
        </div>`;
      }).join('');
      ac.classList.add('on');
      ac.querySelectorAll('.ac-item').forEach((el,i)=>{
        el.addEventListener('click', ()=>{
          const r=res[i];
          const ll = L.latLng(parseFloat(r.lat), parseFloat(r.lon));
          const name = r.display_name.split(',')[0];
          if (isEnd) { endLL=ll; setVal('endInp',name); placeMark('end',ll); }
          else { startLL=ll; setVal('startInp',name); placeMark('start',ll); }
          map.flyTo(ll,15);
          ac.classList.remove('on');
        });
      });
    }, 380);
  });
  field.addEventListener('blur', ()=>setTimeout(()=>ac.classList.remove('on'),200));
}

function renderResultsTab() {
  if (!routes.length) return;
  const tVal = document.getElementById('departTime')?.value || nowTime;
  const dVal = document.getElementById('departDate')?.value || todayStr;
  const [hh,mm] = tVal.split(':').map(Number);
  const depMin = hh*60+mm;
  const sun = getSun(currentHour, currentMonth);
  const dIdx = Math.round(sun.azi/22.5)%16;
  const sunStr = sun.alt>0 ? `${sun.alt.toFixed(0)}° ${DIRS[dIdx]}` : '日没';
  const fmt = m => { const h=Math.floor(m/60)%24,mn=m%60; return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`; };

  const renderSteps = r => {
    if (!r.legs?.[0]?.steps) return '';
    return r.legs[0].steps.slice(0,8).map(s => {
      const ic = s.maneuver?.type==='arrive'?'📍':s.maneuver?.type==='depart'?'🚶':
        s.maneuver?.modifier?.includes('left')?'↰':s.maneuver?.modifier?.includes('right')?'↱':'→';
      const d = s.distance>1000?`${(s.distance/1000).toFixed(1)}km`:`${Math.round(s.distance)}m`;
      return `<div class="step"><span class="step-ic">${ic}</span><span class="step-tx">${s.name||'道路'}</span><span class="step-d">${d}</span></div>`;
    }).join('');
  };

  document.getElementById('shBody').innerHTML = `
    <div class="sun-card">
      <div class="sun-ic">${sun.alt>0?'☀️':'🌙'}</div>
      <div class="sun-rows">
        <div class="sun-r"><span class="sun-l">出発日時</span><span class="sun-v">${dVal} ${tVal}</span></div>
        <div class="sun-r"><span class="sun-l">太陽位置</span><span class="sun-v">${sunStr}</span></div>
      </div>
    </div>
    <div class="sec">ルート比較</div>
    ${routes.map((r,i)=>{
      const dist=(r.route.distance/1000).toFixed(1);
      const mins=Math.round(r.route.duration/60);
      const arr=fmt(depMin+mins);
      const diff=i===1?`+${Math.round((r.route.distance-routes[0].route.distance)/10)*10}m 長い`:'最短距離';
      return `
      <div class="rcard ${r.type}${i===activeR?' sel':''}" id="rc${i}" onclick="selectRoute(${i})">
        <div class="rc-head">
          <div class="rc-type ${r.type}">${r.type==='shortest'?'🟢 最短ルート':'🔵 日陰優先ルート'}</div>
          <span class="rc-badge ${r.type==='shortest'?'b-s':'b-sh'}">${r.type==='shortest'?diff:`日陰 ${Math.round(r.score*100)}%`}</span>
        </div>
        <div class="rc-stats">
          <div class="rc-stat"><div class="rc-v">${dist}<span class="rc-u">km</span></div><div class="rc-l">距離</div></div>
          <div class="rc-stat"><div class="rc-v">${mins}<span class="rc-u">分</span></div><div class="rc-l">所要時間</div></div>
          <div class="rc-stat"><div class="rc-v" style="font-size:18px;color:var(--accent2)">${arr}</div><div class="rc-l">到着予定</div></div>
        </div>
        <div class="sbar"><div class="sbar-fill" style="width:${Math.round(r.score*100)}%"></div></div>
        <div class="slbl">日陰率 ${Math.round(r.score*100)}%</div>
        <div class="steps">${renderSteps(r.route)}</div>
      </div>`;
    }).join('')}
  `;
}

// ─────────────────────────────────────────────
// SUN TAB
// ─────────────────────────────────────────────
function sunRise(mo) {
  const doys=[0,15,46,75,105,135,162,198,228,258,288,318,344];
  const doy=doys[mo]||162;
  const decl=23.45*Math.sin((360/365*(doy-81))*Math.PI/180)*Math.PI/180;
  const cos=(-Math.tan(LAT_R)*Math.tan(decl));
  if(cos>1)return 12; if(cos<-1)return 0;
  return 12-Math.acos(cos)*180/Math.PI/15;
}
function sunSet(mo){return 24-sunRise(mo);}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}

function renderSunTab() {
  const sun = getSun(currentHour, currentMonth);
  const dIdx = Math.round(sun.azi/22.5)%16;
  const shadowLen = sun.alt>2 ? Math.min(999,Math.round(10/Math.tan(sun.altR)))+'m' : '—';
  const seasons = [
    {name:'夏至 (6月)', ic:'☀️', mo:6},
    {name:'春分/秋分', ic:'🌸', mo:3},
    {name:'冬至 (12月)', ic:'❄️', mo:12},
  ];

  document.getElementById('shBody').innerHTML = `
    <div class="sec">現在の太陽</div>
    <div class="stat-grid">
      ${[
        ['太陽高度', sun.alt>0?sun.alt.toFixed(1)+'°':'日没'],
        ['方位', sun.azi.toFixed(0)+'° '+DIRS[dIdx]],
        ['影の方向', DIRS[(dIdx+8)%16]+'方向'],
        ['10m建物の影', shadowLen],
      ].map(([l,v])=>`<div class="stat-box"><div class="stat-v">${v}</div><div class="stat-l">${l}</div></div>`).join('')}
    </div>

    <div class="sec">季節別 日照時間</div>
    ${seasons.map(s=>{
      const rise=sunRise(s.mo), set=sunSet(s.mo), hours=set-rise;
      const noonSun=getSun(12,s.mo);
      return `
      <div class="season-bar">
        <div class="sb-head">
          <span class="sb-n">${s.ic} ${s.name}</span>
          <span class="sb-v">正午高度 ${noonSun.alt.toFixed(0)}°</span>
        </div>
        <div class="sb-track">
          <span class="sb-time">${fmtH(rise)}</span>
          <div class="sb-bar"><div class="sb-fill" style="width:${hours/15*100}%"></div></div>
          <span class="sb-time" style="text-align:right">${fmtH(set)}</span>
        </div>
        <div class="sb-h">日照時間 ${hours.toFixed(1)}時間</div>
      </div>`;
    }).join('')}

    <div class="note">
      💡 東京（北緯35.7°）の実際の天文計算値。夏は太陽が高く影が短い。冬は太陽が低くなりビルの影が長くなります。地図の青い影もリアルタイムで連動しています。
    </div>
  `;
}

// ─────────────────────────────────────────────
// VIEW TOGGLE
// ─────────────────────────────────────────────
function setView(mode) {
  is3D = mode==='3d';
  document.getElementById('p2d').classList.toggle('on',!is3D);
  document.getElementById('p3d').classList.toggle('on',is3D);
  if (is3D) {
    toast('3D表示はMapbox版で対応予定です。現在は2D表示です');
  }
}

// ─────────────────────────────────────────────
// TIME
// ─────────────────────────────────────────────
function onTime(val) {
  currentHour = parseFloat(val);
  const hh=Math.floor(currentHour), mm=Math.round((currentHour-hh)*60);
  const ts=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  const el=document.getElementById('departTime');
  if(el) el.value=ts;
  updateSun();
}

function togglePlay() {
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  if(playing){
    playInv=setInterval(()=>{
      currentHour=(currentHour+0.08);
      if(currentHour>20)currentHour=5;
      document.getElementById('tRange').value=currentHour;
      updateSun();
    },80);
  } else clearInterval(playInv);
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}

let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),2800);
}

function checkInstall(){
  const isIOS=/iPhone|iPad/.test(navigator.userAgent);
  const stand=window.navigator.standalone;
  if(isIOS&&!stand&&!localStorage.getItem('km2-inst')){
    setTimeout(()=>document.getElementById('install').classList.add('on'),4000);
  }
}
function dismissInstall(){
  document.getElementById('install').classList.remove('on');
  localStorage.setItem('km2-inst','1');
}

// ─────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
initMap();

// Fetch buildings on map move
setTimeout(()=>{
  if(map){
    map.on('moveend', scheduleBuildingFetch);
    map.on('zoomend', scheduleBuildingFetch);
    scheduleBuildingFetch();
  }
},1500);
</script>
</body>
